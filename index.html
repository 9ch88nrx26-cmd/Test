function CountUpInline({ to, delay = 0, fontSize = 22, color = C.blue }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true });
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    if (!inView) return;
    const timer = setTimeout(() => {
      const duration = 1200;
      const startTime = performance.now();
      const tick = (now) => {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        setVal(Math.round(to * (1 - Math.pow(1 - progress, 3))));
        if (progress < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }, delay * 1000);
    return () => clearTimeout(timer);
  }, [inView, to, delay]);
  return (
    <span ref={ref} style={{ fontSize, fontWeight: 900, color, lineHeight: 1, letterSpacing: '-0.8px' }}>
      {val}
    </span>
  );
}

function CountUpStat({ target, suffix = '', divisor = 1, decimal = 0 }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, margin: '-50px' });
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    if (!inView) return;
    const duration = 1800;
    const startTime = performance.now();
    const tick = (now) => {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(target * eased);
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [inView, target]);
  const display = decimal > 0
    ? (val / divisor).toFixed(decimal)
    : Math.round(val / divisor).toLocaleString();
  return (
    <div ref={ref} style={{
      fontSize: 'clamp(36px, 6vw, 56px)',
      fontWeight: 900, letterSpacing: '-2px',
      background: 'linear-gradient(135deg,#fff,rgba(255,255,255,0.5))',
      WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
      marginBottom: 6,
    }}>{display}{suffix}</div>
  );
}

    </section>
  );
}

function Footer() {
  return (
    <footer style={{
      borderTop: `1px solid ${C.border}`, padding: '40px 24px 30px', background: C.bgAlt,
    }}>
      <div style={{
        maxWidth: 1100, margin: '0 auto',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        flexWrap: 'wrap', gap: 20,
      }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 900, letterSpacing: '-0.5px', marginBottom: 6 }}>
            Most<span style={{ color: C.blue }}>To</span>
          </div>
          <div style={{ fontSize: 11, color: C.subDim, fontWeight: 600, letterSpacing: '0.5px' }}>
            MORE STRONGER TOMORROW
          </div>
        </div>
        <div style={{ display: 'flex', gap: 16 }}>
          {[Twitter, Instagram, Github].map((Icon, i) => (
            <motion.a
              key={i} href="#"
              whileHover={{ y: -3, scale: 1.08 }}
              transition={{ type: 'spring', stiffness: 300 }}
              style={{
                width: 36, height: 36, borderRadius: 10,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: C.card, border: `1px solid ${C.border}`, color: C.sub,
              }}
            >
              <Icon size={16}/>
            </motion.a>
          ))}
        </div>
      </div>
      <div style={{
        maxWidth: 1100, margin: '24px auto 0', paddingTop: 20,
        borderTop: `1px solid ${C.border}`,
        fontSize: 11, color: C.subDim, textAlign: 'center',
      }}>© 2025 MostTo · All rights reserved</div>
    </footer>
  );
}

function SectionWrap({ children, id, dim }) {
  return (
    <section id={id} style={{
      padding: '100px 24px', background: dim ? C.bgAlt : C.bg, position: 'relative',
    }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>{children}</div>
    </section>
  );
}

function SectionEyebrow({ children }) {
  return (
    <div style={{
      fontSize: 11, fontWeight: 800, letterSpacing: '2px',
      color: C.blue, textAlign: 'center', marginBottom: 14,
    }}>{children}</div>
  );
}

function SectionTitle({ children }) {
  return (
    <h2 style={{
      fontSize: 'clamp(32px, 5.5vw, 52px)',
      fontWeight: 900, letterSpacing: '-2px', lineHeight: 1.1,
      textAlign: 'center', margin: 0, marginBottom: 18,
    }}>{children}</h2>
  );
}

function SectionLead({ children }) {
  return (
    <p style={{
      fontSize: 16, color: C.sub, lineHeight: 1.7,
      textAlign: 'center', maxWidth: 580, margin: '0 auto',
    }}>{children}</p>
  );
}

createRoot(document.getElementById('root')).render(<MosstoLanding />);
</script>
</body>
