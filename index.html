<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(135deg, #ffd9e8 0%, #ffc9e0 35%, #e5ccf5 70%, #d8bff2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* ---------- 배경에 떠다니는 하트 ---------- */
  .floating-heart {
    position: fixed;
    bottom: -8vh;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    from { transform: translateY(0) rotate(0deg); }
    to   { transform: translateY(-120vh) rotate(340deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .floating-heart { display: none; }
    * { animation-duration: 0.01ms !important; }
  }

  /* ---------- 카드 공통 ---------- */
  .card {
    position: relative;
    z-index: 1;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(214, 120, 180, 0.35);
    padding: 42px 32px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    display: none;
  }
  .card.active  { display: block; animation: fadeIn 0.5s ease both; }
  .card.leaving { animation: fadeOut 0.35s ease both; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @keyframes fadeOut {
    from { opacity: 1; transform: translateY(0)     scale(1); }
    to   { opacity: 0; transform: translateY(-14px) scale(0.98); }
  }

  h1 {
    font-size: clamp(1.35rem, 5vw, 1.8rem);
    font-weight: 800;
    color: #5f3d63;
    line-height: 1.4;
    word-break: keep-all;
  }
  .sub {
    margin-top: 10px;
    font-size: 0.98rem;
    color: #ab8bc2;
    font-weight: 500;
    word-break: keep-all;
  }
  .big-emoji {
    font-size: 3.4rem;
    line-height: 1;
    margin-bottom: 14px;
  }

  /* ---------- 이미지 ---------- */
  .main-img {
    width: min(230px, 62vw);
    height: min(230px, 62vw);
    object-fit: cover;
    border-radius: 18px;
    border: 5px solid #ffe3ef;
    box-shadow: 0 10px 26px rgba(255, 143, 184, 0.35);
    margin: 20px 0 4px;
  }
  .step-img {
    width: min(180px, 48vw);
    border-radius: 16px;
    border: 4px solid #ffe3ef;
    box-shadow: 0 8px 20px rgba(255, 143, 184, 0.3);
    margin-bottom: 16px;
  }
  .food-ham { width: min(145px, 40vw); margin-bottom: 4px; }

  /* 거절 시도할 때마다 햄스터 흔들림 */
  .wiggle { animation: wiggle 0.45s ease; }
  .shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    50%      { transform: translateX(6px); }
    75%      { transform: translateX(-4px); }
  }
  @keyframes wiggle {
    0%   { transform: rotate(0deg)  scale(1); }
    25%  { transform: rotate(-4deg) scale(1.06); }
    50%  { transform: rotate(4deg)  scale(1.06); }
    75%  { transform: rotate(-2deg) scale(1.02); }
    100% { transform: rotate(0deg)  scale(1); }
  }

  /* ---------- 버튼 ---------- */
  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    font-size: 1.05rem;
    border-radius: 50px;
    padding: 14px 34px;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.94); }

  .btn-yes {
    background: linear-gradient(135deg, #ff8fb8, #ff6fa5);
    color: #fff;
    animation: glowPulse 1.8s ease-in-out infinite;
  }
  .btn-yes:hover {
    transform: translateY(-3px) scale(1.05);
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 8px 20px rgba(255, 111, 165, 0.45); }
    50%      { box-shadow: 0 8px 32px rgba(255, 111, 165, 0.8); }
  }

  .btn-no {
    background: #ece5f6;
    color: #a292c0;
    padding: 14px 30px;
  }

  .btn-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 26px;
  }

  /* ---------- STEP 3 : 날짜/시간 폼 ---------- */
  .field { text-align: left; margin-top: 20px; }
  .field label {
    display: block;
    font-weight: 600;
    font-size: 0.95rem;
    color: #8a6b9e;
    margin-bottom: 8px;
  }
  .field input,
  .field select {
    width: 100%;
    max-width: 100%;
    padding: 13px 16px;
    border: 2px solid #f3d9ea;
    border-radius: 14px;
    font-family: inherit;
    font-size: 1rem;
    color: #6b4a6e;
    background: #fffafd;
    outline: none;
    transition: border-color 0.2s ease;
  }
  /* iOS 사파리: 날짜 입력창 폭 삐져나옴 + 높이 붕괴 방지 */
  .field input[type="date"] {
    -webkit-appearance: none;
    appearance: none;
    display: block;
    min-height: 50px;
    text-align: left;
  }
  .field input[type="date"]::-webkit-date-and-time-value {
    text-align: left;
    margin: 0;
  }
  .field input:focus,
  .field select:focus { border-color: #ff9dc2; }

  /* ---------- STEP 4 : 음식 그리드 ---------- */
  .food-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 22px;
  }
  .food-card {
    background: #fdf7ff;
    border: 2px solid #f0e3f7;
    border-radius: 16px;
    padding: 16px 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .food-card .f-emoji { font-size: 1.9rem; display: block; margin-bottom: 6px; }
  .food-card .f-name  { font-weight: 600; font-size: 0.84rem; color: #7d5f92; line-height: 1.3; }
  .food-card:hover {
    transform: translateY(-5px);
    border-color: #ffaacd;
    background: #fff5fa;
    box-shadow: 0 10px 22px rgba(255, 140, 190, 0.28);
  }
  .food-card.selected {
    background: linear-gradient(135deg, #ff9cc0, #d9a8f2);
    border-color: transparent;
    animation: pop 0.4s ease both;
  }
  .food-card.selected .f-name { color: #fff; }
  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1.05); }
  }
  @media (max-width: 360px) {
    .food-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ---------- STEP 5 : 하트 한 줄 ---------- */
  .ps {
    margin-top: 16px;
    font-size: 0.88rem;
    font-style: italic;
    color: #b08cc4;
    line-height: 1.7;
    word-break: keep-all;
  }
  .hearts-row { margin-top: 24px; font-size: 1.35rem; color: #ff6fa5; }
  .hearts-row span {
    display: inline-block;
    margin: 0 5px;
    animation: beat 1.3s ease-in-out infinite;
  }
  .hearts-row span:nth-child(2) { animation-delay: 0.12s; }
  .hearts-row span:nth-child(3) { animation-delay: 0.24s; }
  .hearts-row span:nth-child(4) { animation-delay: 0.36s; }
  .hearts-row span:nth-child(5) { animation-delay: 0.48s; }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    30%      { transform: scale(1.3); }
  }
</style>
</head>
<body>

  <!-- ============ STEP 1 : 질문 ============ -->
  <div class="card active" id="step1">
    <h1>나랑 데이트 할래? 🌸</h1>
    <!-- 🐹 햄스터 이미지는 아래 자바스크립트의 HAM 객체에서 관리됨
         거절 시도 1회: 땡글눈알 → 2회: 눈물 한 방울 → 3회 이상: 대성통곡 -->
    <img class="main-img" id="mainImg" alt="햄스터" hidden />
    <div class="btn-row">
      <button class="btn btn-yes" id="yesBtn">좋아 ♥</button>
      <button class="btn btn-no" id="noBtn">싫어 •</button>
    </div>
  </div>

  <!-- ============ STEP 2 : 리액션 (수락하면 장미 햄스터) ============ -->
  <div class="card" id="step2">
    <img class="step-img" id="roseImg" alt="장미를 입에 문 햄스터" hidden />
    <div class="big-emoji" id="roseFb" hidden>🥹💘</div>
    <h1>아니 잠깐만, 진짜 누른 거야?? 😭</h1>
    <p class="sub">솔직히 거절당할 각오까지 하고 있었단 말이야</p>
    <div class="btn-row">
      <button class="btn btn-yes" id="okayBtn">좋았어, 다음! →</button>
    </div>
  </div>

  <!-- ============ STEP 3 : 날짜 & 시간 ============ -->
  <div class="card" id="step3">
    <h1>그래서... 언제 시간 돼? 📅</h1>
    <div class="field">
      <label for="dateInput">날짜 골라줘 📅</label>
      <input type="date" id="dateInput" />
    </div>
    <div class="field">
      <label for="timeSelect">몇 시가 좋아? ⏰</label>
      <!-- ⏰ 시간 옵션은 여기서 자유롭게 추가/수정 -->
      <select id="timeSelect">
        <option value="" disabled selected>시간 골라줘...</option>
        <option>낮 12:00</option>
        <option>오후 1:30</option>
        <option>오후 3:00</option>
        <option>오후 5:00</option>
        <option>오후 6:30</option>
        <option>저녁 8:00</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-yes" id="setDateBtn">날짜 확정! ♥</button>
    </div>
  </div>

  <!-- ============ STEP 4 : 메뉴 고르기 (뚱뚱 햄스터) ============ -->
  <div class="card" id="step4">
    <img class="step-img food-ham" id="fatImg" alt="뭐 먹을지 기대하는 햄스터" hidden />
    <h1>뭐 먹을까? 🍽️✨</h1>
    <p class="sub">복수선택 가능</p>
    <div class="food-grid">
      <div class="food-card"><span class="f-emoji">🍕</span><span class="f-name">피자</span></div>
      <div class="food-card"><span class="f-emoji">🍣</span><span class="f-name">초밥</span></div>
      <div class="food-card"><span class="f-emoji">🍔</span><span class="f-name">버거</span></div>
      <div class="food-card"><span class="f-emoji">🍝</span><span class="f-name">파스타</span></div>
      <div class="food-card"><span class="f-emoji">🌮</span><span class="f-name">타코</span></div>
      <div class="food-card"><span class="f-emoji">🍜</span><span class="f-name">라멘</span></div>
      <div class="food-card"><span class="f-emoji">🥪</span><span class="f-name">오이참치샌드위치</span></div>
      <div class="food-card"><span class="f-emoji">🍙</span><span class="f-name">치즈김밥</span></div>
      <div class="food-card"><span class="f-emoji">👽</span><span class="f-name">엄마는외계인</span></div>
      <div class="food-card"><span class="f-emoji">🍓</span><span class="f-name">말린딸기</span></div>
      <div class="food-card"><span class="f-emoji">🍌</span><span class="f-name">생바나나</span></div>
      <div class="food-card"><span class="f-emoji">🎃</span><span class="f-name">단호박라떼</span></div>
      <div class="food-card"><span class="f-emoji">🍅</span><span class="f-name">토마토스튜</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-yes" id="foodDoneBtn">이걸로 결정! ♥</button>
    </div>
  </div>

  <!-- ============ STEP 5 : 최종 화면 ============ -->
  <div class="card" id="step5">
    <div class="big-emoji">🏃💨</div>
    <!-- 💬 마지막 멘트는 여기서 수정 -->
    <h1>휴, 다행이다.<br><span id="pickupTime">그때</span>까지 데리러 갈게, 준비하고 있어 🏃</h1>
    <div class="hearts-row">
      <span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span>
    </div>
  </div>

<script>
  /* ========== 🐹 햄스터 이미지 (base64 내장) ==========

     ※ 비워두면 알림 없이 사이트만 그냥 작동함 */
  const DISCORD_WEBHOOK_URL = '';

  let noEscapeCount = 0; // '싫어' 버튼이 도망친 횟수 (알림에 같이 보냄 ㅋㅋ)

  function notifyDiscord(title, desc) {
    if (!DISCORD_WEBHOOK_URL.startsWith('https://')) return; // 미설정이면 조용히 패스
    fetch(DISCORD_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        embeds: [{
          title: title,
          description: desc,
          color: 16740261, // 핑크 #ff6fa5
          timestamp: new Date().toISOString()
        }]
      })
    }).catch(() => {}); // 전송 실패해도 사이트는 정상 작동
  }

  /* ---------- 이미지 슬롯 초기화 ---------- */
  const mainImg = document.getElementById('mainImg');

  function setMain(key) {
    if (!HAM[key]) return false;
    if (mainImg.src !== HAM[key]) {
      mainImg.src = HAM[key];
      mainImg.alt = HAM_ALT[key] || '햄스터';
    }
    return true;
  }

  (function initImages() {
    // 메인: 땡글눈알 우선, 없으면 눈물 → 대성통곡 순으로 대체
    const first = ['stare', 'tear', 'bawl'].find(k => HAM[k]);
    if (first) { setMain(first); mainImg.hidden = false; }

    // 2단계: 장미 햄스터 (없으면 이모지)
    if (HAM.rose) document.getElementById('roseImg').hidden = false,
                  document.getElementById('roseImg').src = HAM.rose;
    else document.getElementById('roseFb').hidden = false;

    // 4단계: 뚱뚱 햄스터 (없으면 이미지 생략)
    if (HAM.fat) document.getElementById('fatImg').hidden = false,
                 document.getElementById('fatImg').src = HAM.fat;
  })();

  /* ---------- 거절 시도 → 햄스터 표정 진화 ---------- */
  function updateHamster() {
    const stage = Math.min(noEscapeCount, 3);
    const key = { 1: 'stare', 2: 'tear', 3: 'bawl' }[stage];
    setMain(key);
    mainImg.classList.remove('wiggle');
    void mainImg.offsetWidth; // 리플로우로 흔들림 애니메이션 재시작
    mainImg.classList.add('wiggle');
  }

  /* ---------- STEP 전환 (페이드 아웃 → 인) ---------- */
  function goToStep(n) {
    const cur  = document.querySelector('.card.active');
    const next = document.getElementById('step' + n);
    if (!cur || !next || cur === next) return;
    cur.classList.add('leaving');
    setTimeout(() => {
      cur.classList.remove('active', 'leaving');
      next.classList.add('active');
    }, 330);
  }

  /* ---------- ★ '싫어' 버튼 도망 로직 ★ ----------
     hover(마우스) / touchstart(모바일 터치) 순간
     버튼을 body로 옮기고 position:fixed로 화면 아무 곳으로 순간이동.
     touchstart에서 preventDefault → 탭해도 클릭이 절대 안 먹힘. */
  const noBtn = document.getElementById('noBtn');

  function runAway(e) {
    if (e.cancelable) e.preventDefault();
    noEscapeCount++;
    updateHamster(); // 거절할수록 햄스터가 점점 무너짐

    if (noBtn.parentElement !== document.body) {
      document.body.appendChild(noBtn);   // 카드의 transform 영향 제거
      noBtn.style.position = 'fixed';
      noBtn.style.zIndex = '999';
    }
    const pad  = 12;
    const maxX = Math.max(pad, window.innerWidth  - noBtn.offsetWidth  - pad);
    const maxY = Math.max(pad, window.innerHeight - noBtn.offsetHeight - pad);
    noBtn.style.left = (pad + Math.random() * (maxX - pad)) + 'px';
    noBtn.style.top  = (pad + Math.random() * (maxY - pad)) + 'px';
  }

  noBtn.addEventListener('mouseenter', runAway);
  noBtn.addEventListener('touchstart', runAway, { passive: false });
  noBtn.addEventListener('click', runAway); // 혹시 모를 안전장치

  /* ---------- STEP 1 → 2 ---------- */
  document.getElementById('yesBtn').addEventListener('click', () => {
    noBtn.remove(); // 도망 다니던 '싫어' 버튼 정리
    const escMsg = noEscapeCount > 0
      ? `'싫어' 버튼이 ${noEscapeCount}번 도망쳤는데도 결국 좋대 ㅋㅋ`
      : `'싫어' 버튼은 쳐다도 안 보고 바로 좋아 눌렀음 😳`;
    notifyDiscord('💘 상대방이 좋아 눌렀다!!', escMsg);
    goToStep(2);
  });

  /* ---------- STEP 2 → 3 ---------- */
  document.getElementById('okayBtn').addEventListener('click', () => goToStep(3));

  /* ---------- STEP 3 → 4 ---------- */
  // 오늘 이전 날짜는 선택 불가
  document.getElementById('dateInput').min = new Date().toISOString().split('T')[0];
  document.getElementById('setDateBtn').addEventListener('click', () => goToStep(4));

  /* ---------- STEP 4 → 5 (음식 복수 선택) ---------- */
  document.querySelectorAll('.food-card').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('selected'); // 다시 누르면 해제
    });
  });

  document.getElementById('foodDoneBtn').addEventListener('click', () => {
    const btn = document.getElementById('foodDoneBtn');
    const picks = [...document.querySelectorAll('.food-card.selected')].map(c =>
      c.querySelector('.f-emoji').textContent + ' ' + c.querySelector('.f-name').textContent);

    if (picks.length === 0) { // 하나도 안 골랐으면 버튼 흔들어서 알려주기
      btn.classList.remove('shake');
      void btn.offsetWidth;
      btn.classList.add('shake');
      return;
    }
    const date = document.getElementById('dateInput').value || '(날짜 안 고름)';
    const time = document.getElementById('timeSelect').value || '(시간 안 고름)';
    notifyDiscord('📅 데이트 확정!!',
      '**날짜:** ' + date + '\n**시간:** ' + time + '\n**메뉴:** ' + picks.join(', '));
    // 마지막 화면에 실제 고른 시간 반영 (안 골랐으면 '그때'로 유지)
    const picked = document.getElementById('timeSelect').value;
    if (picked) document.getElementById('pickupTime').textContent = picked;
    goToStep(5);
  });

  /* ---------- 배경 햄스터 생성 ---------- */
  const emojis = ['🐹'];
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('span');
    s.className = 'floating-heart';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (14 + Math.random() * 18) + 'px';
    const dur = 9 + Math.random() * 10;
    s.style.animationDuration = dur + 's';
    s.style.animationDelay = (-Math.random() * dur) + 's';
    document.body.appendChild(s);
  }
</script>
</body>
</html>
